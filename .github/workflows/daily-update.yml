name: Daily ETF Holdings Update

on:
  schedule:
    # 15:40 Taiwan Time (UTC+8) = 07:40 UTC, weekdays only
    - cron: '40 7 * * 1-5'
  workflow_dispatch:   # allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Detect changes
        id: diff
        run: |
          git diff --quiet data/holdings.json \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true"  >> "$GITHUB_OUTPUT"

      - name: Commit & push updated data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "data: 00981A holdings $(date -u +'%Y-%m-%d') [auto]"
          git push

      - name: Notify LINE on holdings changes
        if: steps.diff.outputs.changed == 'true' && env.LINE_NOTIFY_TOKEN != ''
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: |
          python - << 'PYEOF'
          import json, os, urllib.request, urllib.parse, sys

          data = json.load(open("data/holdings.json", encoding="utf-8"))
          ch   = data.get("changes", {})
          added     = ch.get("added",     [])
          removed   = ch.get("removed",   [])
          increased = ch.get("increased", [])
          decreased = ch.get("decreased", [])

          if not (added or removed or increased or decreased):
              print("No changes — skipping notification")
              sys.exit(0)

          lines = [f"\n📊 00981A 持股異動（{data.get('date', '?')}）"]
          if added:
              lines.append("\n🟢 新增建倉")
              for h in added:
                  lines.append(f"  {h['name']}（{h['code']}）+{h['weight']:.2f}%")
          if removed:
              lines.append("\n🔴 完全清倉")
              for h in removed:
                  lines.append(f"  {h['name']}（{h['code']}）")
          if increased:
              lines.append("\n🔵 加碼前五")
              for h in increased[:5]:
                  lines.append(f"  {h['name']} +{h['change']:.2f}%")
          if decreased:
              lines.append("\n🟠 減碼前五")
              for h in decreased[:5]:
                  lines.append(f"  {h['name']} {h['change']:+.2f}%")

          msg   = "\n".join(lines)
          token = os.environ["LINE_NOTIFY_TOKEN"]
          body  = urllib.parse.urlencode({"message": msg}).encode()
          req   = urllib.request.Request(
              "https://notify-api.line.me/api/notify",
              data=body,
              headers={"Authorization": f"Bearer {token}"},
          )
          urllib.request.urlopen(req)
          print("LINE Notify sent!")
          PYEOF
