name: Daily ETF Holdings Update

on:
  schedule:
    # 18:30 Taiwan Time (UTC+8) = 10:30 UTC, weekdays only
    - cron: '30 10 * * 1-5'
  workflow_dispatch:   # allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Detect changes
        id: diff
        run: |
          git diff --quiet data/ \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true"  >> "$GITHUB_OUTPUT"

      - name: Commit & push updated data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "data: 00981A holdings $(date -u +'%Y-%m-%d') [auto]"
          git push

      - name: Notify LINE
        if: steps.diff.outputs.changed == 'true' && env.LINE_CHANNEL_TOKEN != ''
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID:       ${{ secrets.LINE_USER_ID }}
        run: |
          python - << 'PYEOF'
          import json, os, urllib.request, sys
          from pathlib import Path
          from datetime import date

          # ── 00981A 持股異動 ──────────────────────────────────────────────
          data      = json.load(open("data/holdings.json", encoding="utf-8"))

          # 如果資料不是今天的（scraper fallback 使用舊資料），跳過通知
          today_str = date.today().isoformat()
          if data.get("date") != today_str:
              print(f"Data date {data.get('date')} != today {today_str} — skipping notification")
              sys.exit(0)
          ch        = data.get("changes", {})
          added     = ch.get("added",     [])
          removed   = ch.get("removed",   [])
          increased = ch.get("increased", [])
          decreased = ch.get("decreased", [])

          # ── 持股重疊異動 ─────────────────────────────────────────────────
          ov_new = ov_removed = ov_changed = []
          ov_file = Path("data/overlap.json")
          if ov_file.exists():
              ov      = json.loads(ov_file.read_text(encoding="utf-8"))
              ov_ch   = ov.get("changes", {})
              ov_new     = ov_ch.get("new",     [])
              ov_removed = ov_ch.get("removed", [])
              ov_changed = ov_ch.get("changed", [])

          has_holdings = bool(added or removed or increased or decreased)
          has_overlap  = bool(ov_new or ov_removed or ov_changed)

          if not (has_holdings or has_overlap):
              print("No changes — skipping notification")
              sys.exit(0)

          def fmt_zhang(h, sign=True):
              sc = h.get("shares_change")
              if sc is None:
                  return ""
              zhang = sc // 1000
              if zhang == 0:
                  return ""
              prefix = "+" if zhang > 0 else ""
              return f"  {prefix}{zhang:,} 張"

          lines = [f"📊 00981A 每日更新（{data.get('date', '?')}）"]

          # 持股異動區塊
          if has_holdings:
              lines.append("\n【持股異動】")
              if added:
                  lines.append("🟢 新增建倉")
                  for h in added:
                      shares_txt = f"  {h['shares']//1000:,} 張" if h.get("shares") else ""
                      lines.append(f"  {h['name']}（{h['code']}）+{h['weight']:.2f}%{shares_txt}")
              if removed:
                  lines.append("🔴 完全清倉")
                  for h in removed:
                      shares_txt = f"  -{h['shares']//1000:,} 張" if h.get("shares") else ""
                      lines.append(f"  {h['name']}（{h['code']}）{shares_txt}")
              if increased:
                  lines.append("🔵 加碼前五")
                  for h in increased[:5]:
                      lines.append(f"  {h['name']} +{h['change']:.2f}%{fmt_zhang(h)}")
              if decreased:
                  lines.append("🟠 減碼前五")
                  for h in decreased[:5]:
                      lines.append(f"  {h['name']} {h['change']:+.2f}%{fmt_zhang(h)}")

          # 持股重疊異動區塊
          if has_overlap:
              ETF_NAMES = {
                  "00981A": "中信半導體正2", "00891": "中信關鍵半導體",
                  "00892":  "富邦台灣半導體", "00982A": "富邦半導體正2",
                  "0050":   "元大台灣50",    "0056":  "元大高股息",
                  "00919":  "群益精選高息",
              }
              def etf_name(code): return ETF_NAMES.get(code, code)

              lines.append("\n【持股重疊異動】")
              def ov_zhang(s):
                  sh = (s.get("shares_by_etf") or {}).get("00981A")
                  if not sh:
                      return ""
                  zhang = sh // 1000
                  return f"  {zhang:,} 張" if zhang else ""

              if ov_new:
                  lines.append(f"🟢 新增重疊 {len(ov_new)} 檔")
                  for s in ov_new[:5]:
                      etfs = "、".join(etf_name(c) for c in s["etfs"] if c != "00981A")
                      lines.append(f"  {s['name']}（{s['code']}）{ov_zhang(s)}  與 {etfs}")
              if ov_removed:
                  lines.append(f"🔴 移除重疊 {len(ov_removed)} 檔")
                  for s in ov_removed[:5]:
                      etfs = "、".join(etf_name(c) for c in s["etfs"] if c != "00981A")
                      lines.append(f"  {s['name']}（{s['code']}）{ov_zhang(s)}  不再與 {etfs}")
              if ov_changed:
                  lines.append(f"🔵 重疊組合變化 {len(ov_changed)} 檔")
                  for s in ov_changed[:3]:
                      zh = ov_zhang(s)
                      if s.get("added_etfs"):
                          a = "、".join(etf_name(c) for c in s["added_etfs"])
                          lines.append(f"  {s['name']}{zh} ＋{a}")
                      if s.get("removed_etfs"):
                          r = "、".join(etf_name(c) for c in s["removed_etfs"])
                          lines.append(f"  {s['name']}{zh} －{r}")

          payload = json.dumps({
              "to": os.environ["LINE_USER_ID"],
              "messages": [{"type": "text", "text": "\n".join(lines)}],
          }).encode()
          req = urllib.request.Request(
              "https://api.line.me/v2/bot/message/push",
              data=payload,
              headers={
                  "Authorization": f"Bearer {os.environ['LINE_CHANNEL_TOKEN']}",
                  "Content-Type": "application/json",
              },
          )
          urllib.request.urlopen(req)
          print("LINE message sent!")
          PYEOF
