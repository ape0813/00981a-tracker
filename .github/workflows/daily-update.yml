name: Daily ETF Holdings Update

on:
  schedule:
    # 15:40 Taiwan Time (UTC+8) = 07:40 UTC, weekdays only
    - cron: '40 7 * * 1-5'
  workflow_dispatch:   # allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Detect changes
        id: diff
        run: |
          git diff --quiet data/holdings.json \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true"  >> "$GITHUB_OUTPUT"

      - name: Commit & push updated data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "data: 00981A holdings $(date -u +'%Y-%m-%d') [auto]"
          git push

      - name: Notify LINE on holdings changes
        if: steps.diff.outputs.changed == 'true' && env.LINE_CHANNEL_TOKEN != ''
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID:       ${{ secrets.LINE_USER_ID }}
        run: |
          python - << 'PYEOF'
          import json, os, urllib.request, sys

          data = json.load(open("data/holdings.json", encoding="utf-8"))
          ch   = data.get("changes", {})
          added     = ch.get("added",     [])
          removed   = ch.get("removed",   [])
          increased = ch.get("increased", [])
          decreased = ch.get("decreased", [])

          if not (added or removed or increased or decreased):
              print("No changes — skipping notification")
              sys.exit(0)

          lines = [f"📊 00981A 持股異動（{data.get('date', '?')}）"]
          if added:
              lines.append("\n🟢 新增建倉")
              for h in added:
                  lines.append(f"  {h['name']}（{h['code']}）+{h['weight']:.2f}%")
          if removed:
              lines.append("\n🔴 完全清倉")
              for h in removed:
                  lines.append(f"  {h['name']}（{h['code']}）")
          if increased:
              lines.append("\n🔵 加碼前五")
              for h in increased[:5]:
                  lines.append(f"  {h['name']} +{h['change']:.2f}%")
          if decreased:
              lines.append("\n🟠 減碼前五")
              for h in decreased[:5]:
                  lines.append(f"  {h['name']} {h['change']:+.2f}%")

          payload = json.dumps({
              "to": os.environ["LINE_USER_ID"],
              "messages": [{"type": "text", "text": "\n".join(lines)}],
          }).encode()
          req = urllib.request.Request(
              "https://api.line.me/v2/bot/message/push",
              data=payload,
              headers={
                  "Authorization": f"Bearer {os.environ['LINE_CHANNEL_TOKEN']}",
                  "Content-Type": "application/json",
              },
          )
          urllib.request.urlopen(req)
          print("LINE message sent!")
          PYEOF

      - name: Notify LINE on overlap changes
        if: env.LINE_CHANNEL_TOKEN != ''
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID:       ${{ secrets.LINE_USER_ID }}
        run: |
          python - << 'PYEOF'
          import json, os, urllib.request, sys
          from pathlib import Path

          overlap_file = Path("data/overlap.json")
          if not overlap_file.exists():
              print("No overlap.json — skipping")
              sys.exit(0)

          data = json.loads(overlap_file.read_text(encoding="utf-8"))
          ch   = data.get("changes", {})
          new_ov     = ch.get("new",     [])
          removed_ov = ch.get("removed", [])
          changed_ov = ch.get("changed", [])

          if not (new_ov or removed_ov or changed_ov):
              print("No overlap changes — skipping")
              sys.exit(0)

          ETF_NAMES = {
              "00981A": "中信半導體正2", "00891": "中信關鍵半導體",
              "00892":  "富邦台灣半導體", "00982A": "富邦半導體正2",
              "0050":   "元大台灣50",    "0056":  "元大高股息",
              "00919":  "群益精選高息",
          }
          def etf_name(code): return ETF_NAMES.get(code, code)

          lines = [f"🔗 ETF 持股重疊異動（{data.get('date', '?')}）"]

          if new_ov:
              lines.append(f"\n🟢 新增重疊（共 {len(new_ov)} 檔）")
              for s in new_ov[:8]:
                  etfs = "、".join(etf_name(c) for c in s["etfs"] if c != "00981A")
                  lines.append(f"  {s['name']}（{s['code']}）← 與 {etfs} 同時持有")

          if removed_ov:
              lines.append(f"\n🔴 移除重疊（共 {len(removed_ov)} 檔）")
              for s in removed_ov[:8]:
                  etfs = "、".join(etf_name(c) for c in s["etfs"] if c != "00981A")
                  lines.append(f"  {s['name']}（{s['code']}）← 不再與 {etfs} 重疊")

          if changed_ov:
              lines.append(f"\n🔵 重疊組合變化（共 {len(changed_ov)} 檔）")
              for s in changed_ov[:5]:
                  if s.get("added_etfs"):
                      a = "、".join(etf_name(c) for c in s["added_etfs"])
                      lines.append(f"  {s['name']} ＋{a}")
                  if s.get("removed_etfs"):
                      r = "、".join(etf_name(c) for c in s["removed_etfs"])
                      lines.append(f"  {s['name']} －{r}")

          payload = json.dumps({
              "to": os.environ["LINE_USER_ID"],
              "messages": [{"type": "text", "text": "\n".join(lines)}],
          }).encode()
          req = urllib.request.Request(
              "https://api.line.me/v2/bot/message/push",
              data=payload,
              headers={
                  "Authorization": f"Bearer {os.environ['LINE_CHANNEL_TOKEN']}",
                  "Content-Type": "application/json",
              },
          )
          urllib.request.urlopen(req)
          print("Overlap LINE message sent!")
          PYEOF
